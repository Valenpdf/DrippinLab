version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: drippin-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "${DB_PORT:-}"  # Leave empty to not expose, or set to "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD} -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - drippin-net
    # Required env vars
    env_file:
      - path: .env
        required: true

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drippin-web
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS:-http://+:80}
      - ConnectionStrings__DefaultConnection=Server=db;Database=DrippinDB;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - EmailSettings__Host=${EMAILSETTINGS__HOST}
      - EmailSettings__Port=${EMAILSETTINGS__PORT}
      - EmailSettings__Username=${GMAIL_USERNAME}
      - EmailSettings__Password=${GMAIL_PASSWORD}
      - EmailSettings__SenderName=${EMAILSETTINGS__SENDERNAME}
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "${WEB_PORT:-5000}:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - drippin-net
    # Required env vars
    env_file:
      - path: .env
        required: true

networks:
  drippin-net:
    driver: bridge

volumes:
  sqlserver_data: