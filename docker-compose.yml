version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: drippin-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd123 -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drippin-web
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=db;Database=DrippinDB;User Id=sa;Password=YourStrong!Passw0rd123;TrustServerCertificate=True
      - EmailSettings__Host=smtp.gmail.com
      - EmailSettings__Port=587
      - EmailSettings__Username=your_email@gmail.com
      - EmailSettings__Password=your_app_password
      - EmailSettings__SenderName=Drippin Shop
    ports:
      - "5000:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver_data: