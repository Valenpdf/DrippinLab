version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: drippin-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD:?SA_PASSWORD is required}
      - MSSQL_PID=Developer
    ports:
      - "${DB_PORT:-}"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD} -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - drippin-net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drippin-web
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS:-http://+:80}
      - ConnectionStrings__DefaultConnection=Server=db;Database=DrippinDB;User Id=sa;Password=${SA_PASSWORD:?SA_PASSWORD is required};TrustServerCertificate=True
      - EmailSettings__Host=${EMAILSETTINGS__HOST:-smtp.gmail.com}
      - EmailSettings__Port=${EMAILSETTINGS__PORT:-587}
      - EmailSettings__Username=${GMAIL_USERNAME:?GMAIL_USERNAME is required}
      - EmailSettings__Password=${GMAIL_PASSWORD:?GMAIL_PASSWORD is required}
      - EmailSettings__SenderName=${EMAILSETTINGS__SENDERNAME:-Drippin Shop}
    ports:
      - "${WEB_PORT:-5000}:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - drippin-net

networks:
  drippin-net:
    driver: bridge

volumes:
  sqlserver_data: